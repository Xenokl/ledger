<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060810">
<title>Ledger v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ── TOKENS ── */
:root {
  --bg: #060810; --s1: #0C1019; --s2: #111622; --s3: #18202E; --s4: #212C3E;
  --b1: rgba(255,255,255,.07); --b2: rgba(255,255,255,.12); --b3: rgba(255,255,255,.18);
  --txt: #EDE8DF; --t2: rgba(237,232,223,.55); --t3: rgba(237,232,223,.3); --t4: rgba(237,232,223,.13);
  --gold: #C9A84C; --glow: rgba(201,168,76,.14);
  --green: #34D399; --red: #F87171; --blue: #60A5FA;
  --sidebar: 228px; --top: 54px;
  --ease: cubic-bezier(.22,1,.36,1);
}

/* ── BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--txt); font-family: 'Sora', sans-serif;
  height: 100%; overflow: hidden; -webkit-font-smoothing: antialiased; font-size: 13px; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--s4); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--b2); }
input, select, button, textarea { font-family: 'Sora', sans-serif; -webkit-appearance: none; outline: none; color: inherit; }
button { cursor: pointer; border: none; background: none; }
input[type=date], input[type=month] { color-scheme: dark; }
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
select option { background: var(--s2); }

/* ── LAYOUT ── */
.layout { display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR */
.sidebar { width: var(--sidebar); flex-shrink: 0; background: var(--s1);
  border-right: 1px solid var(--b1); display: flex; flex-direction: column; overflow: hidden; }
.logo-area { padding: 20px 16px 18px; border-bottom: 1px solid var(--b1); display: flex; align-items: center; gap: 10px; }
.logo-mark { width: 30px; height: 30px; border-radius: 8px; background: var(--gold);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.logo-mark svg { width: 16px; height: 16px; stroke: #060810; fill: none; stroke-width: 2.3;
  stroke-linecap: round; stroke-linejoin: round; }
.logo-name { font-size: 16px; font-weight: 700; letter-spacing: -.3px; }
.logo-sub { font-size: 10px; color: var(--t3); margin-top: 1px; }
.nav-scroll { flex: 1; overflow-y: auto; padding: 10px 0; }
.nav-group { padding: 0 10px 8px; }
.nav-lbl { font-size: 9px; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase;
  color: var(--t3); padding: 6px 8px 4px; display: block; }
.ni { display: flex; align-items: center; gap: 9px; padding: 9px 10px; border-radius: 9px;
  color: var(--t2); cursor: pointer; margin-bottom: 1px; font-weight: 500; font-size: 13px;
  transition: background .18s, color .18s; user-select: none; }
.ni svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.8;
  stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; transition: stroke .18s; }
.ni:hover { background: var(--b1); color: var(--txt); }
.ni:active { transform: scale(.97); }
.ni.on { background: var(--glow); color: var(--gold); }
.ni.on svg { stroke: var(--gold); }
.sidebar-foot { padding: 12px 18px; border-top: 1px solid var(--b1); }
.sidebar-foot .sh-lbl { font-size: 9px; font-weight: 700; letter-spacing: 1.4px;
  text-transform: uppercase; color: var(--t3); margin-bottom: 7px; }
.sidebar-foot .ksh { font-size: 11px; color: var(--t3); line-height: 2.2; }
kbd { background: var(--s3); border: 1px solid var(--b2); border-radius: 5px;
  padding: 1px 6px; font-family: inherit; font-size: 10px; color: var(--t2); }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.topbar { height: var(--top); background: var(--s1); border-bottom: 1px solid var(--b1);
  display: flex; align-items: center; padding: 0 22px; gap: 10px; flex-shrink: 0; }
.tb-title { font-size: 15px; font-weight: 700; letter-spacing: -.2px; flex: 1; }
.content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 22px; }

/* TOPBAR CONTROLS */
.tb-pill { display: flex; align-items: center; gap: 6px; padding: 7px 12px; border-radius: 8px;
  background: var(--s2); border: 1px solid var(--b1); font-size: 12px; color: var(--t2);
  cursor: pointer; transition: border-color .18s, color .18s, transform .1s; font-family: 'Sora', sans-serif; }
.tb-pill:hover { border-color: var(--b2); color: var(--txt); }
.tb-pill:active { transform: scale(.96); }
.tb-pill svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 1.8; flex-shrink: 0; }
.add-btn { display: flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: 9px;
  background: var(--gold); color: #060810; font-size: 13px; font-weight: 700;
  transition: filter .15s, transform .1s; font-family: 'Sora', sans-serif; border: none; cursor: pointer; }
.add-btn:hover { filter: brightness(1.08); }
.add-btn:active { transform: scale(.96); }
.add-btn svg { width: 13px; height: 13px; fill: none; stroke: #060810; stroke-width: 2.3; flex-shrink: 0; }

/* MOBILE NAV */
.mob-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(6,8,16,.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--b1); height: 68px;
  padding-bottom: env(safe-area-inset-bottom, 0px); z-index: 200;
  grid-template-columns: repeat(5,1fr); }
.mnb { display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; color: var(--t3); padding: 6px 0; border: none; background: none;
  font-family: 'Sora', sans-serif; transition: color .18s; cursor: pointer; }
.mnb svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.7;
  stroke-linecap: round; stroke-linejoin: round; transition: stroke .18s; }
.mnb span { font-size: 9px; font-weight: 500; letter-spacing: .4px; text-transform: uppercase; }
.mnb.on { color: var(--gold); }
.mob-fab-col { display: flex; flex-direction: column; align-items: center; gap: 0; }
.mob-fab { width: 48px; height: 48px; border-radius: 15px; background: var(--gold);
  display: flex; align-items: center; justify-content: center; margin-top: -16px;
  box-shadow: 0 6px 20px rgba(201,168,76,.32); transition: transform .12s, box-shadow .12s; }
.mob-fab:active { transform: scale(.92); box-shadow: 0 3px 10px rgba(201,168,76,.2); }
.mob-fab svg { width: 22px; height: 22px; stroke: #060810; stroke-width: 2.2; fill: none; }
.mob-fab-lbl { font-size: 9px; font-weight: 500; letter-spacing: .4px; text-transform: uppercase;
  color: var(--t3); margin-top: 2px; }

/* ── CARDS ── */
.card { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; }
.cp { padding: 20px; }
.card-hover { transition: border-color .2s, background .2s; cursor: pointer; }
.card-hover:hover { border-color: var(--b2); background: var(--s2); }

/* ── KPI GRID ── */
.kpi-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 18px; }
.kpi { padding: 18px; border-radius: 14px; border: 1px solid var(--b1); background: var(--s1);
  position: relative; overflow: hidden; }
.kpi-ico { position: absolute; top: 14px; right: 14px; width: 32px; height: 32px;
  border-radius: 9px; display: flex; align-items: center; justify-content: center; }
.kpi-ico svg { width: 14px; height: 14px; fill: none; stroke: currentColor;
  stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.kpi-lbl { font-size: 9px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase;
  color: var(--t3); margin-bottom: 9px; }
.kpi-val { font-family: 'Crimson Pro', serif; font-size: 30px; font-weight: 300;
  letter-spacing: -1px; line-height: 1; margin-bottom: 5px; }
.kpi-sub { font-size: 11px; color: var(--t3); }

/* ── GRID HELPERS ── */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 18px; }
.g21 { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; margin-bottom: 18px; }
.g12 { display: grid; grid-template-columns: 1fr 2fr; gap: 14px; margin-bottom: 18px; }

/* ── SECTION HEADER ── */
.sh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 13px; }
.sht { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--t3); }
.sha { font-size: 12px; color: var(--gold); cursor: pointer; font-weight: 600;
  transition: opacity .15s; background: none; border: none; font-family: 'Sora', sans-serif; }
.sha:hover { opacity: .75; }

/* ── TABLE ── */
.tbl { width: 100%; border-collapse: collapse; }
.tbl th { font-size: 9px; font-weight: 700; letter-spacing: 1.1px; text-transform: uppercase;
  color: var(--t3); padding: 0 14px 10px; text-align: left; border-bottom: 1px solid var(--b1);
  cursor: pointer; user-select: none; white-space: nowrap; transition: color .15s; }
.tbl th:hover { color: var(--t2); }
.tbl td { padding: 11px 14px; border-bottom: 1px solid var(--b1); vertical-align: middle;
  white-space: nowrap; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tbody tr { transition: background .12s; cursor: pointer; }
.tbl tbody tr:hover { background: var(--s2); }
.t-ico { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; }
.t-ico svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 1.8;
  stroke-linecap: round; stroke-linejoin: round; }
.badge { display: inline-flex; align-items: center; padding: 3px 7px; border-radius: 5px;
  font-size: 10px; font-weight: 700; letter-spacing: .3px; white-space: nowrap; }

/* ── INPUTS ── */
.inp { background: var(--s2); border: 1px solid var(--b1); border-radius: 9px;
  padding: 9px 12px; font-size: 13px; color: var(--txt);
  transition: border-color .18s, background .18s; width: 100%; }
.inp:focus { border-color: var(--gold); background: var(--s3); }
.inp::placeholder { color: var(--t3); }
.inp-sm { padding: 7px 10px; font-size: 12px; }
.lbl { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase;
  color: var(--t3); margin-bottom: 5px; display: block; }
.field { margin-bottom: 12px; }
.seg { display: flex; background: var(--s2); border: 1px solid var(--b1);
  border-radius: 9px; padding: 3px; gap: 2px; }
.sb { flex: 1; border-radius: 7px; padding: 9px; font-size: 13px; font-weight: 600;
  color: var(--t3); transition: background .18s, color .18s, box-shadow .18s;
  background: transparent; font-family: 'Sora', sans-serif; border: none; cursor: pointer; }
.sb.on { background: var(--s3); color: var(--txt); box-shadow: 0 2px 8px rgba(0,0,0,.3); }

/* ── PROGRESS ── */
.pb { height: 5px; background: var(--s3); border-radius: 3px; overflow: hidden; }
.pf { height: 100%; border-radius: 3px; transition: width .65s var(--ease); }
.pb-md { height: 7px; border-radius: 4px; }
.pb-lg { height: 9px; border-radius: 5px; }

/* ── SWITCH ── */
.sw { width: 38px; height: 22px; border-radius: 11px; background: var(--s3);
  border: 1px solid var(--b1); position: relative; transition: background .2s;
  cursor: pointer; flex-shrink: 0; display: inline-block; }
.sw.on { background: var(--gold); }
.swk { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
  border-radius: 8px; background: #fff; transition: transform .2s var(--ease);
  box-shadow: 0 1px 4px rgba(0,0,0,.3); }
.sw.on .swk { transform: translateX(16px); }

/* ── MODAL ── */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-bg.open { display: flex; }
.modal { background: var(--s1); border: 1px solid var(--b2); border-radius: 18px;
  padding: 26px; width: 480px; max-width: 100%; max-height: 90vh; overflow-y: auto;
  position: relative; animation: modalIn .32s var(--ease); }
@keyframes modalIn { from { opacity: 0; transform: scale(.95) translateY(10px); }
  to { opacity: 1; transform: none; } }
.mcl { position: absolute; top: 14px; right: 14px; width: 28px; height: 28px;
  border-radius: 7px; background: var(--s2); border: 1px solid var(--b1);
  display: flex; align-items: center; justify-content: center; color: var(--t2);
  cursor: pointer; transition: background .15s, color .15s; }
.mcl:hover { background: var(--s3); color: var(--txt); }
.mcl svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2; }
.mtitle { font-size: 17px; font-weight: 700; margin-bottom: 3px; letter-spacing: -.3px; }
.msub { font-size: 12px; color: var(--t3); margin-bottom: 20px; }

/* ── TOAST ── */
#toast { position: fixed; top: 18px; left: 50%; z-index: 9999; pointer-events: none;
  transform: translateX(-50%) translateY(-64px);
  padding: 10px 20px; border-radius: 26px; font-size: 13px; font-weight: 600;
  white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,.55);
  transition: transform .36s var(--ease), opacity .3s ease; opacity: 0; }
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── SEARCH ── */
.srch { position: relative; }
.srch svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; fill: none; stroke: var(--t3); stroke-width: 2;
  pointer-events: none; stroke-linecap: round; }
.srch .inp { padding-left: 34px; }

/* ── DOT ── */
.dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; display: inline-block; }

/* ── CAT STACK ── */
.cat-stack { height: 10px; border-radius: 6px; display: flex; overflow: hidden; gap: 2px; margin: 10px 0; }
.cat-seg { height: 100%; border-radius: 3px; cursor: pointer;
  transition: flex .7s var(--ease), filter .15s; min-width: 3px; }
.cat-seg:hover { filter: brightness(1.25); }

/* ── PAGE ANIMATIONS ── */
/* ── ANIMATIONS ── */
@keyframes fadeUp   { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
@keyframes scaleIn  { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: scale(1); } }
@keyframes slideRight { from { transform: translateX(-100%); } to { transform: translateX(0); } }
@keyframes countPop { 0%{transform:scale(1)} 50%{transform:scale(1.04)} 100%{transform:scale(1)} }

.au  { animation: fadeUp .4s var(--ease) both; }
.au2 { animation: fadeUp .4s .07s var(--ease) both; }
.au3 { animation: fadeUp .4s .14s var(--ease) both; }
.au4 { animation: fadeUp .4s .21s var(--ease) both; }
.au5 { animation: fadeUp .4s .28s var(--ease) both; }
.au6 { animation: fadeUp .4s .35s var(--ease) both; }
.fi  { animation: fadeIn .3s ease both; }

/* KPI auto-stagger */
.kpi-grid .kpi:nth-child(1) { animation: fadeUp .4s .04s var(--ease) both; }
.kpi-grid .kpi:nth-child(2) { animation: fadeUp .4s .09s var(--ease) both; }
.kpi-grid .kpi:nth-child(3) { animation: fadeUp .4s .14s var(--ease) both; }
.kpi-grid .kpi:nth-child(4) { animation: fadeUp .4s .19s var(--ease) both; }

/* Progress bars animate on load */
.pf { animation: slideRight .7s var(--ease) both; }

/* Card hover lift */
.card { transition: border-color .2s, box-shadow .2s; }
.card:hover { border-color: var(--b2); }
.kpi { transition: border-color .2s, transform .2s, box-shadow .2s; }
.kpi:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.25); }

/* PAGE TRANSITION */
.content { transition: opacity .18s ease; }
.content.fading { opacity: 0; pointer-events: none; }

/* Number pop on update */
.pop { animation: countPop .25s ease; }

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  .sidebar { display: none; }
  .main { width: 100%; }
  .topbar { display: none; }
  .mob-nav { display: grid; }
  .content { padding: 14px; padding-bottom: calc(72px + env(safe-area-inset-bottom,0px));
    height: 100vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .g2, .g3, .g21, .g12 { grid-template-columns: 1fr; }
  .hide-mob { display: none !important; }
  .mob-pt { padding-top: 48px; }
  .modal-bg { align-items: flex-end; padding: 0; }
  .modal { width: 100%; border-radius: 20px 20px 0 0;
    padding: 22px 20px calc(28px + env(safe-area-inset-bottom,0px)); max-height: 92vh; }
}

/* ── DEL BTN ── */
.del-btn { color: var(--t3); padding: 5px; border-radius: 6px;
  transition: color .15s, background .15s; display: inline-flex; }
.del-btn:hover { color: var(--red); background: rgba(248,113,113,.1); }
.del-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor;
  stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; }
</style>
</head>
<body>

<div class="layout">
<!-- ═══ SIDEBAR ═══ -->
<aside class="sidebar">
  <div class="logo-area">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
    </div>
    <div>
      <div class="logo-name">Ledger</div>
      <div class="logo-sub">v3 · Finance Tracker</div>
    </div>
  </div>

  <div class="nav-scroll">
    <div class="nav-group">
      <span class="nav-lbl">Overview</span>
      <div class="ni on" id="nav-overview" onclick="go('overview')">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
        Total Overview
      </div>
      <div class="ni" id="nav-monthly" onclick="go('monthly')">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Monthly View
      </div>
    </div>
    <div class="nav-group">
      <span class="nav-lbl">Spending</span>
      <div class="ni" id="nav-where" onclick="go('where')">
        <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        Where I Spent It
      </div>
      <div class="ni" id="nav-transactions" onclick="go('transactions')">
        <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Transactions
      </div>
      <div class="ni" id="nav-analytics" onclick="go('analytics')">
        <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Analytics
      </div>
    </div>
    <div class="nav-group">
      <span class="nav-lbl">Planning</span>
      <div class="ni" id="nav-budget" onclick="go('budget')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        Budget
      </div>
      <div class="ni" id="nav-goals" onclick="go('goals')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        Goals
      </div>
    </div>
    <div class="nav-group">

/* ═══════════════════════════════════════════════
   CATEGORIES
═══════════════════════════════════════════════ */
const CATS = [
  { id:'food',      l:'Food',          c:'#F87171', bg:'rgba(248,113,113,.12)' },
  { id:'transport', l:'Transport',     c:'#60A5FA', bg:'rgba(96,165,250,.12)'  },
  { id:'home',      l:'Housing',       c:'#A78BFA', bg:'rgba(167,139,250,.12)' },
  { id:'shopping',  l:'Shopping',      c:'#34D399', bg:'rgba(52,211,153,.12)'  },
  { id:'fun',       l:'Entertainment', c:'#FB923C', bg:'rgba(251,146,60,.12)'  },
  { id:'health',    l:'Health',        c:'#F472B6', bg:'rgba(244,114,182,.12)' },
  { id:'education', l:'Education',     c:'#38BDF8', bg:'rgba(56,189,248,.12)'  },
  { id:'bills',     l:'Bills',         c:'#FBBF24', bg:'rgba(251,191,36,.12)'  },
  { id:'other',     l:'Other',         c:'#94A3B8', bg:'rgba(148,163,184,.12)' },
];
const ICATS = [
  { id:'salary',       l:'Salary',     c:'#34D399', bg:'rgba(52,211,153,.12)'  },
  { id:'freelance',    l:'Freelance',  c:'#60A5FA', bg:'rgba(96,165,250,.12)'  },
  { id:'gift',         l:'Gift',       c:'#F472B6', bg:'rgba(244,114,182,.12)' },
  { id:'investment',   l:'Investment', c:'#C9A84C', bg:'rgba(201,168,76,.12)'  },
  { id:'other_income', l:'Other',      c:'#94A3B8', bg:'rgba(148,163,184,.12)' },
];
const MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const now = () => new Date().toISOString().split('T')[0];

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
const ls = (k,d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } };
const ss = (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

let S = {
  tab: 'overview',
  txs: ls('lg3_txs', []),
  budgets: ls('lg3_bud', {}),
  goals: ls('lg3_goals', []),
  currency: ls('lg3_cur', '€'),
  mType: 'expense',
  mRec: false,
  sm: new Date().getMonth(),
  sy: new Date().getFullYear(),
  tSort: 'date', tDir: -1, tSearch: '', tFilter: 'all',
};
const save = () => {
  ss('lg3_txs', S.txs); ss('lg3_bud', S.budgets);
  ss('lg3_goals', S.goals); ss('lg3_cur', S.currency);
};

/* ═══════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════ */
const cur = () => S.currency;
const f2 = (n, d=2) => cur() + Math.abs(n).toLocaleString('en', { minimumFractionDigits:d, maximumFractionDigits:d });
const fk = n => n >= 1000 ? cur() + (n/1000).toFixed(1) + 'k' : f2(n, 0);
const gc = (type, id) => (type === 'expense' ? CATS : ICATS).find(c => c.id === id) || { l: id, c: '#94A3B8', bg: 'rgba(148,163,184,.12)' };
const mTxs = (m, y) => S.txs.filter(t => t.month === m && t.year === y);
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const chartOpts = { backgroundColor: 'rgba(6,8,16,.97)', titleColor: 'rgba(237,232,223,.8)',
  bodyColor: 'rgba(237,232,223,.55)', borderColor: 'rgba(255,255,255,.1)', borderWidth: 1 };
const mkChart = (id, type, data, opts) => {
  const el = document.getElementById(id); if (!el) return;
  const ex = Chart.getChart(el); if (ex) ex.destroy();
  return new Chart(el, { type, data, options: { responsive:true, maintainAspectRatio:false,
    plugins: { legend: { display: false }, tooltip: { ...chartOpts, ...opts } }, ...opts } });
};

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
let _tt;
function toast(msg, ok=true) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = ok ? 'rgba(52,211,153,.95)' : 'rgba(248,113,113,.9)';
  el.style.color = ok ? '#052e16' : '#fff';
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 2400);
}

/* ═══════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════ */
function openModal() {
  const cats = S.mType === 'expense' ? CATS : ICATS;
  document.getElementById('m-cat').innerHTML = cats.map(c => `<option value="${c.id}">${c.l}</option>`).join('');
  document.getElementById('m-date').value = now();
  document.getElementById('m-amt').value = '';
  document.getElementById('m-desc').value = '';
  document.getElementById('m-note').value = '';
  S.mRec = false;
  document.getElementById('m-sw').className = 'sw';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('m-amt').focus(), 80);
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function setMType(t) {
  S.mType = t;
  document.getElementById('m-cat').innerHTML = (t === 'expense' ? CATS : ICATS)
    .map(c => `<option value="${c.id}">${c.l}</option>`).join('');
  document.querySelectorAll('#m-seg .sb').forEach((b, i) =>
    b.classList.toggle('on', i === (t === 'expense' ? 0 : 1)));
}
function toggleRec() {
  S.mRec = !S.mRec;
  document.getElementById('m-sw').className = 'sw' + (S.mRec ? ' on' : '');
}
function submitTx() {
  const amt = parseFloat(document.getElementById('m-amt').value);
  const desc = document.getElementById('m-desc').value.trim();
  if (!amt || amt <= 0 || !desc) { toast('Enter amount & description', false); return; }
  const dateStr = document.getElementById('m-date').value || now();
  const d = new Date(dateStr);
  S.txs.unshift({ id: Date.now(), desc, amount: amt,
    cat: document.getElementById('m-cat').value, type: S.mType,
    date: dateStr, note: document.getElementById('m-note').value.trim(),
    rec: S.mRec, month: d.getMonth(), year: d.getFullYear() });
  save(); closeModal(); toast('Transaction added'); render();
}
function delTx(id) {
  if (!confirm('Delete this transaction?')) return;
  S.txs = S.txs.filter(t => t.id !== id);
  save(); toast('Deleted', false); render();
}

/* ═══════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════ */
const TITLES = { overview:'Total Overview', monthly:'Monthly View', where:'Where I Spent It',
  transactions:'Transactions', analytics:'Analytics', budget:'Budget', goals:'Goals', settings:'Settings' };
const MOB_TABS = ['overview','where','monthly','analytics'];

function go(tab) {
  S.tab = tab;
  document.querySelectorAll('.ni').forEach(el => el.classList.remove('on'));
  document.querySelectorAll('.mnb').forEach(el => el.classList.remove('on'));
  const ni = document.getElementById('nav-' + tab);
  const mn = document.getElementById('mnav-' + tab);
  if (ni) ni.classList.add('on');
  if (mn) mn.classList.add('on');
  const ttEl = document.getElementById('tb-title');
  if (ttEl) ttEl.textContent = TITLES[tab] || tab;
  // topbar actions
  const ta = document.getElementById('tb-actions');
  if (ta) {
    if (tab === 'transactions') {
      ta.innerHTML = `<button class="tb-pill" onclick="expCSV()">${IC.export}<span>Export</span></button>
        <label class="tb-pill" style="cursor:pointer">${IC.import}<span>Import</span>
          <input type="file" accept=".csv" onchange="impCSV(event)" style="display:none">
        </label>`;
    } else { ta.innerHTML = ''; }
  }
  fadeAndRender();
}

function onGSearch(q) {
  if (!q.trim()) return;
  S.tSearch = q; go('transactions');
}

/* ═══════════════════════════════════════════════
   EXPORT / IMPORT
═══════════════════════════════════════════════ */
function expCSV() {
  const rows = [['Date','Description','Type','Category','Amount','Note','Recurring']];
  S.txs.forEach(t => {
    const cat = gc(t.type, t.cat);
    rows.push([t.date, '"'+t.desc+'"', t.type, cat.l,
      (t.type === 'income' ? 1 : -1) * t.amount, '"'+(t.note||'')+'"', t.rec?'Yes':'No']);
  });
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(rows.map(r => r.join(',')).join('\n'));
  a.download = 'ledger_' + now() + '.csv'; a.click(); toast('Exported to CSV');
}
function impCSV(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    const lines = ev.target.result.split('\n').slice(1); let ct = 0;
    lines.forEach(line => {
      const cols = line.match(/(".*?"|[^,]+)/g);
      if (!cols || cols.length < 5) return;
      const [date, desc, type, cat, amount, note, rec] = cols.map(c => c.replace(/^"|"$/g,'').trim());
      const d = new Date(date); if (isNaN(d)) return;
      S.txs.push({ id: Date.now()+ct, desc, amount: Math.abs(parseFloat(amount)||0),
        cat: (cat||'other').toLowerCase().replace(/ /g,'_'), type: type||'expense',
        date, note: note||'', rec: rec==='Yes', month: d.getMonth(), year: d.getFullYear() });
      ct++;
    });
    S.txs.sort((a,b) => new Date(b.date) - new Date(a.date));
    save(); toast(`Imported ${ct} transactions`); render();
  };
  r.readAsText(file); e.target.value = '';
}
function expJSON() {
  const d = { txs: S.txs, budgets: S.budgets, goals: S.goals };
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(d,null,2));
  a.download = 'ledger_backup_' + now() + '.json'; a.click(); toast('Backup exported');
}
function impJSON(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.txs) S.txs = d.txs; if (d.budgets) S.budgets = d.budgets; if (d.goals) S.goals = d.goals;
      save(); toast('Backup restored'); render();
    } catch { toast('Invalid file', false); }
  };
  r.readAsText(file); e.target.value = '';
}

/* ═══════════════════════════════════════════════
   KEYBOARD SHORTCUTS
═══════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
  if (e.key === 'n' || e.key === 'N') openModal();
  if (e.key === 'f' || e.key === 'F') document.getElementById('gsearch')?.focus();
  if (e.key === 'e' || e.key === 'E') expCSV();
  if (e.key === 'Escape') closeModal();
});

/* ═══════════════════════════════════════════════
   PAGE TRANSITION + RENDER
═══════════════════════════════════════════════ */
let _renderTimer;
function fadeAndRender() {
  const c = document.getElementById('content');
  c.classList.add('fading');
  clearTimeout(_renderTimer);
  _renderTimer = setTimeout(() => {
    c.classList.remove('fading');
    render();
  }, 120);
}

function render() {
  const c = document.getElementById('content');
  const txs = mTxs(S.sm, S.sy);
  const inc = txs.filter(t => t.type === 'income').reduce((s,t) => s+t.amount, 0);
  const exp = txs.filter(t => t.type === 'expense').reduce((s,t) => s+t.amount, 0);
  const pages = { overview: rOverview, monthly: rMonthly, where: rWhere,
    transactions: rTrans, analytics: rAnal, budget: rBudget, goals: rGoals, settings: rSettings };
  (pages[S.tab] || rOverview)(c, txs, inc, exp);
}

        <th style="text-align:right">Amount</th><th style="width:40px"></th>
      </tr></thead>

        ${txs.filter(t=>t.type==='expense').sort((a,b)=>new Date(b.date)-new Date(a.date)).map(t => txRow(t)).join('') ||
          '<tr><td colspan="5" style="text-align:center;padding:28px;color:var(--t3)">No expenses yet</td></tr>'}
      </tbody>
    </table>
  </div>`;
}

/* ═══════════════════════════════════════════════
   PAGE: MONTHLY VIEW
═══════════════════════════════════════════════ */
function rMonthly(c, txs, inc, exp) {
  const { sm, sy, budgets } = S;
  const bal = inc - exp;
  const bc  = bal >= 0 ? 'var(--green)' : 'var(--red)';
  const prevM = sm===0?11:sm-1, prevY = sm===0?sy-1:sy;
  const prevExp = mTxs(prevM,prevY).filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const diff = prevExp > 0 ? Math.round((exp-prevExp)/prevExp*100) : 0;
  const days = new Date(sy,sm+1,0).getDate();
  const avgDay = exp > 0 ? (exp/days).toFixed(0) : 0;
  const expByCat = CATS.map(cc => ({
    ...cc, total: txs.filter(t=>t.type==='expense'&&t.cat===cc.id).reduce((s,t)=>s+t.amount,0)
  })).filter(cc => cc.total > 0).sort((a,b) => b.total-a.total);

  c.innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px" class="au">
    <div>
      <h1 style="font-size:20px;font-weight:700;letter-spacing:-.3px">${MO[sm]} ${sy}</h1>
      <div style="font-size:12px;color:var(--t3);margin-top:2px">${txs.length} transactions this month</div>
    </div>
    ${monthSelect(sm,sy)}
  </div>

  <div class="kpi-grid">
    <div class="kpi" style="background:rgba(52,211,153,.05);border-color:rgba(52,211,153,.15)">
      <div class="kpi-ico" style="background:rgba(52,211,153,.12);color:var(--green)">${IC.up}</div>
      <div class="kpi-lbl" style="color:rgba(52,211,153,.65)">Income</div>
      <div class="kpi-val" style="color:var(--green)">${f2(inc)}</div>
      <div class="kpi-sub">${txs.filter(t=>t.type==='income').length} entries</div>
    </div>
    <div class="kpi" style="background:rgba(248,113,113,.05);border-color:rgba(248,113,113,.15)">
      <div class="kpi-ico" style="background:rgba(248,113,113,.12);color:var(--red)">${IC.down}</div>
      <div class="kpi-lbl" style="color:rgba(248,113,113,.65)">Expenses</div>
      <div class="kpi-val" style="color:var(--red)">${f2(exp)}</div>
      <div class="kpi-sub" style="color:${diff>0?'var(--red)':diff<0?'var(--green)':'var(--t3)'}">
        ${diff!==0?(diff>0?'▲':'▼')+Math.abs(diff)+'% vs last month':'First month on record'}
      </div>
    </div>
    <div class="kpi" style="background:${bal>=0?'rgba(52,211,153,.04)':'rgba(248,113,113,.04)'};border-color:${bal>=0?'rgba(52,211,153,.14)':'rgba(248,113,113,.14)'}">
      <div class="kpi-ico" style="background:var(--glow);color:var(--gold)">${IC.target}</div>
      <div class="kpi-lbl">Balance</div>
      <div class="kpi-val" style="color:${bc}">${bal>=0?'+':'−'}${f2(Math.abs(bal))}</div>
      <div class="kpi-sub">Savings: <span style="font-weight:600;color:${bc}">${inc>0?Math.max(0,Math.round(bal/inc*100)):0}%</span></div>
    </div>
    <div class="kpi">
      <div class="kpi-ico" style="background:rgba(96,165,250,.12);color:var(--blue)">${IC.repeat}</div>
      <div class="kpi-lbl">Daily Average</div>
      <div class="kpi-val">${cur()}${avgDay}</div>
      <div class="kpi-sub">spending per day</div>
    </div>
  </div>

  <div class="g21 au2">
    <div class="card cp">
      <div class="sh"><span class="sht">Expenses This Month</span></div>
      ${expByCat.length ? expByCat.map(cc => `<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="t-ico" style="background:${cc.bg};color:${cc.c};width:28px;height:28px;border-radius:8px;flex-shrink:0">${IC[cc.id]||IC.other}</div>
            <span style="font-size:13px;font-weight:500">${cc.l}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:13px;font-weight:700;color:${cc.c};font-variant-numeric:tabular-nums">${f2(cc.total)}</span>
            <span style="font-size:11px;color:var(--t3);width:28px;text-align:right">${exp?Math.round(cc.total/exp*100):0}%</span>
          </div>
        </div>
        <div class="pb"><div class="pf" style="width:${exp?cc.total/exp*100:0}%;background:${cc.c}"></div></div>
        ${budgets[cc.id] ? `<div style="font-size:10px;color:${cc.total>budgets[cc.id]?'var(--red)':'var(--t3)'};margin-top:3px">
          Budget ${f2(budgets[cc.id])} · ${cc.total>budgets[cc.id]?'Over '+f2(cc.total-budgets[cc.id]):'Left '+f2(budgets[cc.id]-cc.total)}</div>` : ''}
      </div>`).join('') : `<div style="text-align:center;padding:28px 0;color:var(--t3);font-size:13px">No expenses this month</div>`}
    </div>

    <div style="display:flex;flex-direction:column;gap:14px">
      <div class="card cp">
        <div class="sh"><span class="sht">Budget Status</span>
          <button class="sha" onclick="go('budget')">Edit →</button></div>
        ${Object.keys(budgets).length===0 ? `<div style="text-align:center;padding:14px 0;color:var(--t3);font-size:12px">No budgets set</div>` : ''}
        ${Object.entries(budgets).slice(0,5).map(([cid,lim]) => {
          const cat = CATS.find(cc=>cc.id===cid); if (!cat) return '';
          const sp = txs.filter(t=>t.cat===cid&&t.type==='expense').reduce((s,t)=>s+t.amount,0);
          const pct = Math.min(100, sp/lim*100); const over = sp > lim;
          return `<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;margin-bottom:5px">
              <span style="font-size:12px;color:${over?'var(--red)':'var(--txt)'}">${cat.l}</span>
              <span style="font-size:11px;color:${over?'var(--red)':'var(--t3)'};font-variant-numeric:tabular-nums">${f2(sp,0)} / ${f2(lim,0)}</span>
            </div>
            <div class="pb"><div class="pf" style="width:${pct}%;background:${over?'var(--red)':cat.c}"></div></div>
          </div>`;
        }).join('')}
      </div>
      <div class="card cp">
        <div class="sh"><span class="sht">Recent</span></div>
        ${txs.slice(0,6).map(t => {
          const cat = gc(t.type, t.cat);
          return `<div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--b1);cursor:pointer"
            onclick="delTx(${t.id})" title="Click to delete">
            <div class="t-ico" style="background:${cat.bg};color:${cat.c};width:30px;height:30px;border-radius:8px;flex-shrink:0">${IC[t.cat]||IC.other}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.desc)}</div>
              <div style="font-size:10px;color:var(--t3)">${cat.l} · ${t.date}</div>
            </div>
            <div style="font-size:13px;font-weight:700;color:${t.type==='income'?'var(--green)':'var(--red)'};flex-shrink:0;font-variant-numeric:tabular-nums">${t.type==='income'?'+':'−'}${f2(t.amount)}</div>
          </div>`;
        }).join('') || `<div style="text-align:center;padding:14px;color:var(--t3);font-size:12px">No transactions</div>`}
      </div>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════
   PAGE: TRANSACTIONS
═══════════════════════════════════════════════ */
function rTrans(c) {
  let list = [...S.txs];
  if (S.tFilter !== 'all') list = list.filter(t => t.type === S.tFilter);
  if (S.tSearch.trim()) {
    const q = S.tSearch.toLowerCase();
    list = list.filter(t => t.desc.toLowerCase().includes(q) ||
      (t.note||'').toLowerCase().includes(q) ||
      gc(t.type,t.cat).l.toLowerCase().includes(q));
  }
  list.sort((a,b) => {
    if (S.tSort === 'date')   return S.tDir * (new Date(b.date) - new Date(a.date));
    if (S.tSort === 'amount') return S.tDir * (b.amount - a.amount);
    if (S.tSort === 'desc')   return S.tDir * a.desc.localeCompare(b.desc);
    return 0;
  });
  const th = (k,l) => `<th onclick="S.tSort==='${k}'?S.tDir*=-1:(S.tSort='${k}',S.tDir=-1);rTrans(document.getElementById('content'))"
    style="${S.tSort===k?'color:var(--gold)':''}">${l}${S.tSort===k?(S.tDir===1?' ↑':' ↓'):''}</th>`;

  c.innerHTML = `
  <div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap" class="au">
    <div class="srch" style="flex:1;min-width:180px">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="inp" placeholder="Search transactions…" value="${esc(S.tSearch)}"
        oninput="S.tSearch=this.value;rTrans(document.getElementById('content'))">
    </div>
    <div class="seg" style="width:260px">
      <button class="sb${S.tFilter==='all'?' on':''}"     onclick="S.tFilter='all';rTrans(document.getElementById('content'))">All (${S.txs.length})</button>
      <button class="sb${S.tFilter==='expense'?' on':''}" onclick="S.tFilter='expense';rTrans(document.getElementById('content'))">Expenses</button>
      <button class="sb${S.tFilter==='income'?' on':''}"  onclick="S.tFilter='income';rTrans(document.getElementById('content'))">Income</button>
    </div>
    <span style="font-size:12px;color:var(--t3)">${list.length} results</span>
  </div>
  <div class="card au2" style="overflow:hidden">
    <table class="tbl" style="width:100%">
      <thead><tr>${th('desc','Description')}<th>Category</th>${th('date','Date')}<th>Note</th>${th('amount','Amount')}<th>Rec.</th><th style="width:40px"></th></tr></thead>
      <tbody>
        ${list.map(t => {
          const cat = gc(t.type, t.cat);
          return `<tr>
            <td><div style="display:flex;align-items:center;gap:9px">
              <div class="t-ico" style="background:${cat.bg};color:${cat.c};flex-shrink:0">${IC[t.cat]||IC.other}</div>
              <span style="font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis">${esc(t.desc)}</span>
            </div></td>
            <td><span class="badge" style="background:${cat.bg};color:${cat.c}">${cat.l}</span></td>
            <td style="color:var(--t3);font-size:12px">${t.date}</td>
            <td style="color:var(--t3);font-size:12px;max-width:120px;overflow:hidden;text-overflow:ellipsis">${esc(t.note)||'—'}</td>
            <td style="font-weight:700;color:${t.type==='income'?'var(--green)':'var(--red)'};text-align:right;font-variant-numeric:tabular-nums">${t.type==='income'?'+':'−'}${f2(t.amount)}</td>
            <td style="text-align:center">${t.rec?`<span class="badge" style="background:var(--glow);color:var(--gold)">REC</span>`:'—'}</td>
            <td><button class="del-btn" onclick="delTx(${t.id})">${IC.trash}</button></td>
          </tr>`;
        }).join('') || '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--t3)">No transactions found</td></tr>'}
      </tbody>
    </table>
  </div>`;
}

/* ═══════════════════════════════════════════════
   PAGE: ANALYTICS
═══════════════════════════════════════════════ */
function rAnal(c, txs, inc, exp) {
  const { txs: all, sm, sy } = S;
  const bal = inc - exp;
  const savRate = inc>0 ? Math.max(0, Math.round(bal/inc*100)) : 0;
  const days = new Date(sy,sm+1,0).getDate();
  const avgDay = exp>0 ? (exp/days).toFixed(0) : 0;
  const expByCat = CATS.map(cc => ({
    ...cc, total: txs.filter(t=>t.type==='expense'&&t.cat===cc.id).reduce((s,t)=>s+t.amount,0)
  })).filter(cc=>cc.total>0).sort((a,b)=>b.total-a.total);
  const incByCat = ICATS.map(cc => ({
    ...cc, total: txs.filter(t=>t.type==='income'&&t.cat===cc.id).reduce((s,t)=>s+t.amount,0)
  })).filter(cc=>cc.total>0);
  const last12 = Array.from({length:12},(_,i) => {
    const d = new Date(); d.setMonth(d.getMonth()-(11-i));
    const m=d.getMonth(), y=d.getFullYear();
    const ts = all.filter(t=>t.month===m&&t.year===y);
    return { n:MO[m], i:ts.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),
      e:ts.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0) };
  });

  c.innerHTML = `
  <div class="g3">
    <div class="kpi au"><div class="kpi-lbl">Savings Rate</div>
      <div class="kpi-val" style="color:${savRate>=20?'var(--green)':savRate>=10?'var(--gold)':'var(--red)'}">${savRate}%</div>
      <div class="kpi-sub">of income saved</div></div>
    <div class="kpi au2"><div class="kpi-lbl">Daily Average</div>
      <div class="kpi-val">${cur()}${avgDay}</div>
      <div class="kpi-sub">per day this month</div></div>
    <div class="kpi au3"><div class="kpi-lbl">Recurring</div>
      <div class="kpi-val" style="color:var(--gold)">${f2(txs.filter(t=>t.rec&&t.type==='expense').reduce((s,t)=>s+t.amount,0),0)}</div>
      <div class="kpi-sub">${txs.filter(t=>t.rec&&t.type==='expense').length} recurring entries</div></div>
  </div>

  <div class="card cp au4" style="margin-bottom:16px">
    <div class="sh"><span class="sht">12-Month Trend</span></div>
    <div style="height:210px"><canvas id="a-bar"></canvas></div>
  </div>

  <div class="g2 au5">
    ${expByCat.length ? `<div class="card cp">
      <div class="sh"><span class="sht">Expenses by Category</span></div>
      <div style="height:190px;margin-bottom:14px"><canvas id="a-pie"></canvas></div>
      ${expByCat.map(cc => `<div style="margin-bottom:9px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <div style="display:flex;align-items:center;gap:6px"><div class="dot" style="background:${cc.c}"></div><span style="font-size:12px">${cc.l}</span></div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:12px;font-weight:600;color:${cc.c};font-variant-numeric:tabular-nums">${f2(cc.total)}</span>
            <span style="font-size:11px;color:var(--t3);width:28px;text-align:right">${exp?Math.round(cc.total/exp*100):0}%</span>
          </div>
        </div>
        <div class="pb"><div class="pf" style="width:${exp?cc.total/exp*100:0}%;background:${cc.c}"></div></div>
      </div>`).join('')}
    </div>` : '<div class="card cp" style="display:flex;align-items:center;justify-content:center;color:var(--t3)">No expense data</div>'}
    <div class="card cp">
      ${incByCat.length ? `<div class="sh"><span class="sht">Income Sources</span></div>
        <div style="height:190px;margin-bottom:14px"><canvas id="a-ipie"></canvas></div>
        ${incByCat.map(cc => `<div style="display:flex;align-items:center;gap:9px;margin-bottom:10px">
          <div class="t-ico" style="background:${cc.bg};color:${cc.c};width:30px;height:30px;border-radius:8px">${IC[cc.id]||IC.other_income}</div>
          <div style="flex:1">
            <div style="font-size:12px;font-weight:500;margin-bottom:4px">${cc.l}</div>
            <div class="pb"><div class="pf" style="width:${inc?cc.total/inc*100:0}%;background:${cc.c}"></div></div>
          </div>
          <span style="font-size:13px;font-weight:600;color:${cc.c};font-variant-numeric:tabular-nums">${f2(cc.total)}</span>
        </div>`).join('')}` : '<div style="text-align:center;padding:60px 0;color:var(--t3)">No income data</div>'}
    </div>
  </div>`;

  requestAnimationFrame(() => {
    const ab = document.getElementById('a-bar');
    if (ab) { const e=Chart.getChart(ab);if(e)e.destroy();
      new Chart(ab,{type:'bar',data:{labels:last12.map(d=>d.n),datasets:[
        {label:'Income',data:last12.map(d=>d.i),backgroundColor:'rgba(52,211,153,.6)',borderRadius:4,borderSkipped:false},
        {label:'Expenses',data:last12.map(d=>d.e),backgroundColor:'rgba(248,113,113,.6)',borderRadius:4,borderSkipped:false}
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'rgba(237,232,223,.4)',font:{size:10,family:'Sora'}},boxWidth:8,boxHeight:8},
        tooltip:{...chartOpts,callbacks:{label:c=>`${c.dataset.label}: ${f2(c.raw)}`}}},
        scales:{x:{grid:{display:false},ticks:{color:'rgba(237,232,223,.25)',font:{size:10,family:'Sora'}}},y:{display:false}}}}); }
    const ap = document.getElementById('a-pie');
    if (ap&&expByCat.length) { const e=Chart.getChart(ap);if(e)e.destroy();
      new Chart(ap,{type:'doughnut',data:{labels:expByCat.map(c=>c.l),datasets:[{data:expByCat.map(c=>c.total),backgroundColor:expByCat.map(c=>c.c),borderWidth:0,hoverOffset:5}]},
        options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{display:false},
          tooltip:{...chartOpts,callbacks:{label:c=>`${f2(c.raw)}`}}}}}); }
    const ip = document.getElementById('a-ipie');
    if (ip&&incByCat.length) { const e=Chart.getChart(ip);if(e)e.destroy();
      new Chart(ip,{type:'doughnut',data:{labels:incByCat.map(c=>c.l),datasets:[{data:incByCat.map(c=>c.total),backgroundColor:incByCat.map(c=>c.c),borderWidth:0,hoverOffset:5}]},
        options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{display:false},
          tooltip:{...chartOpts,callbacks:{label:c=>`${f2(c.raw)}`}}}}}); }
  });
}

/* ═══════════════════════════════════════════════
   PAGE: BUDGET
═══════════════════════════════════════════════ */
function rBudget(c, txs) {
  const { budgets } = S;
  const totalBud = Object.values(budgets).reduce((s,v) => s+v, 0);
  const totalSp  = txs.filter(t=>t.type==='expense').reduce((s,t) => s+t.amount, 0);

  c.innerHTML = `
  <div class="g2 au">
    <div class="kpi"><div class="kpi-lbl">Total Budget</div>
      <div class="kpi-val">${f2(totalBud)}</div><div class="kpi-sub">monthly limit</div></div>
    <div class="kpi" style="background:${totalSp>totalBud?'rgba(248,113,113,.05)':'rgba(52,211,153,.05)'};border-color:${totalSp>totalBud?'rgba(248,113,113,.14)':'rgba(52,211,153,.14)'}">
      <div class="kpi-lbl">Spent</div>
      <div class="kpi-val" style="color:${totalSp>totalBud?'var(--red)':'var(--green)'}">${f2(totalSp)}</div>
      <div class="kpi-sub">${totalBud>0?Math.round(totalSp/totalBud*100)+'% used':'No budget set yet'}</div>
    </div>
  </div>
  <div class="card au2" style="overflow:hidden">
    <div style="padding:18px 18px 12px;display:flex;justify-content:space-between;align-items:center">
      <span class="sht">Category Limits</span>
      <span style="font-size:11px;color:var(--t3)">Edit field to set limit, leave empty to remove</span>
    </div>
    <table class="tbl" style="width:100%">
      <thead><tr><th>Category</th><th>Spent</th><th>Limit</th><th>Progress</th><th style="text-align:right">Remaining</th></tr></thead>
      <tbody>
        ${CATS.map(cat => {
          const lim = budgets[cat.id] || 0;
          const sp  = txs.filter(t=>t.cat===cat.id&&t.type==='expense').reduce((s,t)=>s+t.amount,0);
          const pct = lim ? Math.min(100, sp/lim*100) : 0;
          const over = lim > 0 && sp > lim;
          return `<tr>
            <td><div style="display:flex;align-items:center;gap:9px">
              <div class="t-ico" style="background:${cat.bg};color:${cat.c}">${IC[cat.id]||IC.other}</div>
              <span style="font-weight:500">${cat.l}</span>
            </div></td>
            <td style="font-weight:600;color:${over?'var(--red)':'var(--txt)'};font-variant-numeric:tabular-nums">${f2(sp)}</td>
            <td><input type="number" value="${lim||''}" placeholder="No limit"
              onchange="const v=parseFloat(this.value);if(v>0){S.budgets['${cat.id}']=v;}else{delete S.budgets['${cat.id}'];}save();toast('Budget updated');render()"
              class="inp inp-sm" style="width:100px;text-align:right"></td>
            <td style="width:150px">${lim ? `<div class="pb"><div class="pf" style="width:${pct}%;background:${over?'var(--red)':cat.c}"></div></div>
              ${over?`<div style="font-size:10px;color:var(--red);margin-top:3px">Over by ${f2(sp-lim)}</div>`:''}` : '—'}</td>
            <td style="text-align:right;font-size:12px;color:${over?'var(--red)':'var(--t3)'};font-variant-numeric:tabular-nums">
              ${lim ? (over?'−':'+')+f2(Math.abs(lim-sp)) : '—'}
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

/* ═══════════════════════════════════════════════
   PAGE: GOALS
═══════════════════════════════════════════════ */
function rGoals(c) {
  const { goals } = S;
  c.innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px" class="au">
    <div>
      <h1 style="font-size:20px;font-weight:700;letter-spacing:-.3px">Savings Goals</h1>
      <div style="font-size:12px;color:var(--t3);margin-top:2px">${goals.length} goal${goals.length!==1?'s':''} tracked</div>
    </div>
    <button class="add-btn" onclick="showGoalForm()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Goal
    </button>
  </div>
  <div id="gform"></div>
  ${goals.length===0 ? `<div class="card cp au2" style="text-align:center;padding:60px;color:var(--t3)">
    <div style="font-size:13px">No goals yet. Click "New Goal" to start saving!</div>
  </div>` : ''}
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px" class="au2">
    ${goals.map((g,i) => {
      const pct  = Math.min(100, g.saved/g.target*100);
      const done = pct >= 100;
      return `<div class="card cp" style="${done?'border-color:rgba(52,211,153,.25);':''}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:13px">
          <div>
            <div style="font-size:15px;font-weight:700">${esc(g.name)}</div>
            <div style="font-size:11px;color:var(--t3);margin-top:2px">Target: ${f2(g.target)}</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            ${done?`<span class="badge" style="background:rgba(52,211,153,.15);color:var(--green)">DONE</span>`:''}
            <button class="del-btn" onclick="S.goals.splice(${i},1);save();toast('Goal deleted',false);go('goals')">${IC.trash}</button>
          </div>
        </div>
        <div style="font-family:'Crimson Pro',serif;font-size:30px;font-weight:300;letter-spacing:-1px;
          color:${done?'var(--green)':'var(--txt)'};margin-bottom:4px">${f2(g.saved)}</div>
        <div style="font-size:11px;color:var(--t3);margin-bottom:10px">
          ${done?'Goal complete!':'Remaining: '+f2(g.target-g.saved)}</div>
        <div class="pb pb-lg" style="margin-bottom:13px">
          <div class="pf" style="width:${pct}%;background:${done?'var(--green)':'var(--gold)'}"></div>
        </div>
        <div style="font-size:18px;font-weight:700;text-align:right;color:${done?'var(--green)':'var(--gold)'};margin-bottom:12px">${Math.round(pct)}%</div>
        <div style="display:flex;align-items:center;gap:8px">
          <input type="number" placeholder="Add funds…" class="inp inp-sm" style="flex:1" id="gi-${i}">
          <button onclick="(function(){const v=parseFloat(document.getElementById('gi-${i}').value);if(v>0){S.goals[${i}].saved=Math.min(S.goals[${i}].target,S.goals[${i}].saved+v);save();toast('Progress updated');go('goals');}else{toast('Enter amount',false);}})()"
            style="background:var(--gold);border:none;border-radius:8px;padding:8px 14px;font-size:12px;
              font-weight:700;color:#060810;font-family:'Sora',sans-serif;cursor:pointer;
              white-space:nowrap;transition:filter .15s"
            onmouseover="this.style.filter='brightness(1.08)'" onmouseout="this.style.filter=''">
            ${IC.check} Add
          </button>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

  <div class="card cp au" style="margin-bottom:18px;border-color:var(--b2)">

  </div>`;
  document.getElementById('gn')?.focus();

// count-up utility
function countUp(el, target, dur=900) {
  if (!el) return;
  const start = performance.now();
  const fmt = n => S.currency + Math.abs(n).toLocaleString('en', {minimumFractionDigits:0, maximumFractionDigits:0});
  function step(now) {
    const p = Math.min(1, (now - start) / dur);
    const ease = 1 - Math.pow(1-p, 3);
    el.textContent = fmt(target * ease);
    if (p < 1) requestAnimationFrame(step);
    else el.textContent = fmt(target);
  }
  requestAnimationFrame(step);
}
